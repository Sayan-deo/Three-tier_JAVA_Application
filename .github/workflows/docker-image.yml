name: Compose CI

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  compose:
    runs-on: ubuntu-latest

    steps:
      # 1️ Checkout with write permission
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      # 2️ Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3️ Measure Build Time
      - name: Build Docker Compose
        run: |
          START_TIME=$(date +%s)
          docker compose build
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))

          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
          echo "Build Time: $BUILD_TIME"

      # 4️ Run Decision Engine
      - name: Run Decision Engine
        run: |
          DEPLOY=$(python decision_engine.py)
          echo "DEPLOY=$DEPLOY" >> $GITHUB_ENV
          echo "Decision: $DEPLOY"

      # 5️ Conditional Deployment
      - name: Run Docker Compose
        if: env.DEPLOY == 'true'
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: docker compose up -d

      # 6️ Stop Containers
      - name: Stop Docker Compose
        if: always()
        run: docker compose down

      # 7️ Commit Updated History Back to Repo
      - name: Commit Updated Metrics
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add metrics/history.json
          git commit -m "Update metrics history [skip ci]" || echo "No changes to commit"
          git push
